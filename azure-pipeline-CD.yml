# Release Coordinator Pipeline — Supporting Guide
# Attachment to email: Re: Deployment Sequence for Multi-Component Releases
#
# PURPOSE
# This guide demonstrates how a single orchestrator pipeline in Azure DevOps can
# manage the deployment sequence across WebApp, DataPlatform and AIML components
# dynamically, driven by a small YAML configuration file. No pipeline YAML changes
# are needed between releases — the release manager edits release-config.yml only.
#
# REPOSITORY STRUCTURE ASSUMED
#   MyProject/release-coordinator  — holds this pipeline YAML and release-config.yml
#   MyProject/WebApp-Repo          — React frontend and Web APIs
#   MyProject/DataPlatform-Repo    — Fabric / Azure SQL schema and pipelines
#   MyProject/AIML-Repo            — ML scoring pipeline
#
# REFERENCES
#   Multi-repo checkout:         https://learn.microsoft.com/en-us/azure/devops/pipelines/repos/multi-repo-checkout
#   Pipeline artifacts:          https://learn.microsoft.com/en-us/azure/devops/pipelines/artifacts/pipeline-artifacts
#   DownloadPipelineArtifact@2:  https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/download-pipeline-artifact-v2

# ─────────────────────────────────────────────────────────────────────────────
# FILE 1: release-config.yml
# Commit this file to the release-coordinator repo and edit it per release.
# ─────────────────────────────────────────────────────────────────────────────

# release-config.yml
#
# Edit the 'enabled' flags to define which components are in scope for this release.
# The orchestrator pipeline reads this file and skips any disabled components.
# The deployment sequence (DataPlatform > AIML > WebApp) is enforced by the
# pipeline stage dependencies regardless of which components are enabled.

release:
  name: "Release 1.0 — WebApp MVP"
  targetEnvironment: "Staging101"        # staging | uat | production

components:
  dataplatform:
    enabled: false                    # Set to true when DB/Fabric changes are in scope
    pipelineName: "DataPlatform-CI"
    branch: "refs/heads/main"
    artifactName: "dataplatform-drop"

  aiml:
    enabled: true                    # Set to true when ML pipeline changes are in scope
    pipelineName: "AIML-CI"
    branch: "refs/heads/main"
    artifactName: "aiml-drop"
    note: "AIML always deploys after DataPlatform when both are enabled"

  webapp:
    enabled: false                     # WebApp is in scope for Release 1
    pipelineName: "WebApp-CI"
    branch: "refs/heads/main"
    artifactName: "webapp-drop"
    note: "WebApp always deploys last — it is the consumer of all upstream components"


# ─────────────────────────────────────────────────────────────────────────────
# FILE 2: release-coordinator.yml
# The orchestrator pipeline. Store in the release-coordinator repo.
# ─────────────────────────────────────────────────────────────────────────────

# release-coordinator.yml
#
# Trigger: Manual only. Release coordinators should not auto-trigger.
# Reads release-config.yml to determine scope, downloads artifacts in order,
# deploys each component with conditional gates.

trigger: none

parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: "staging"
    values:
      - staging
      - uat
      - production

  - name: dryRun
    displayName: "Dry Run (validate only, no actual deployment)"
    type: boolean
    default: false

# Declare the coordinator repo so we can read release-config.yml from it.
# All component CI pipelines are also declared so their artifacts are accessible.
resources:
  repositories:
    - repository: coordinator
      type: git
      name: MyProject/release-coordinator
      ref: refs/heads/main

  pipelines:
    - pipeline: webapp-ci
      project: MyProject
      source: "WebApp-CI"
      branch: main

    - pipeline: dataplatform-ci
      project: MyProject
      source: "DataPlatform-CI"
      branch: main

    - pipeline: aiml-ci
      project: MyProject
      source: "AIML-CI"
      branch: main

pool:
  vmImage: "ubuntu-latest"

stages:

  # Stage 0: Read release-config.yml and output which components are enabled.
  # All subsequent stages depend on the output variables set here.
  - stage: ValidateConfig
    displayName: "Read Release Config"
    jobs:
      - job: ReadConfig
        steps:
          - checkout: coordinator
            path: coordinator

          - task: PowerShell@2
            displayName: "Parse release-config.yml and set component flags"
            inputs:
              targetType: inline
              script: |
                # Install powershell-yaml module if not present
                if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
                  Install-Module powershell-yaml -Force -Scope CurrentUser
                }
                Import-Module powershell-yaml

                $config = Get-Content "$(Pipeline.Workspace)/coordinator/release-config.yml" | ConvertFrom-Yaml
                $release = $config.release

                Write-Host "Release: $($release.name)"
                Write-Host "Target environment: ${{ parameters.environment }}"
                Write-Host ""

                $dp  = $config.components.dataplatform.enabled
                $ai  = $config.components.aiml.enabled
                $web = $config.components.webapp.enabled

                # Output flags as pipeline variables for downstream stage conditions
                Write-Host "##vso[task.setvariable variable=dp_enabled;isOutput=true]$dp"
                Write-Host "##vso[task.setvariable variable=ai_enabled;isOutput=true]$ai"
                Write-Host "##vso[task.setvariable variable=web_enabled;isOutput=true]$web"

                Write-Host "Components in scope:"
                if ($dp)  { Write-Host "  [1] DataPlatform" }
                if ($ai)  { Write-Host "  [2] AIML (deploys after DataPlatform)" }
                if ($web) { Write-Host "  [3] WebApp (deploys last)" }
                if (-not $dp -and -not $ai -and -not $web) {
                  Write-Error "No components are enabled in release-config.yml. Nothing to deploy."
                  exit 1
                }
            name: configOutput

  # Stage 1: DataPlatform — schema changes, Fabric deployment.
  # Skipped automatically when dataplatform.enabled = false.
  - stage: DeployDataPlatform
    displayName: "Deploy DataPlatform"
    dependsOn: ValidateConfig
    condition: >
      eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.dp_enabled'], 'True')
    jobs:
      - deployment: DataPlatformDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download DataPlatform artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.dataplatform-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: dataplatform-drop
                    targetPath: $(Pipeline.Workspace)/dataplatform

                - task: AzureCLI@2
                  displayName: "Apply database schema and Fabric changes"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying DataPlatform to ${{ parameters.environment }}"
                      bash $(Pipeline.Workspace)/dataplatform/scripts/deploy.sh \
                        --env ${{ parameters.environment }}

  # Stage 2: AIML — ML pipeline deployment.
  # Skipped when aiml.enabled = false.
  # If DataPlatform was in scope but failed, this stage will not run.
  # If DataPlatform was not in scope (Skipped), this stage will still run if AIML is enabled.
  - stage: DeployAIML
    displayName: "Deploy AIML Pipeline"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.ai_enabled'], 'True')
      )
    jobs:
      - deployment: AIMLDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download AIML artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.aiml-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: aiml-drop
                    targetPath: $(Pipeline.Workspace)/aiml

                - task: AzureCLI@2
                  displayName: "Deploy AIML scoring pipeline"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying AIML to ${{ parameters.environment }}"
                      bash $(Pipeline.Workspace)/aiml/scripts/deploy.sh \
                        --env ${{ parameters.environment }}

  # Stage 3: WebApp — React frontend and Web APIs. Always the last component deployed.
  # Waits for both DataPlatform and AIML to complete or be skipped before proceeding.
  # If either of those stages failed (not skipped), WebApp deployment is blocked.
  - stage: DeployWebApp
    displayName: "Deploy WebApp (React + API)"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
      - DeployAIML
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployAIML.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.web_enabled'], 'True')
      )
    jobs:
      - deployment: WebAppDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download WebApp artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.webapp-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: webapp-drop
                    targetPath: $(Pipeline.Workspace)/webapp

                - task: AzureCLI@2
                  displayName: "Deploy React app and API to Azure"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying WebApp to ${{ parameters.environment }}"
                      az staticwebapp deploy \
                        --app-location "$(Pipeline.Workspace)/webapp/dist" \
                        --deployment-token $(AZURE_STATIC_WEB_APP_TOKEN)


# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE THIS FOR EACH RELEASE
# ─────────────────────────────────────────────────────────────────────────────
#
# Release 1 (WebApp only):
#   dataplatform.enabled: false
#   aiml.enabled:         false
#   webapp.enabled:       true
#   Result: Stages 1 and 2 are skipped. Only Stage 3 runs.
#
# Future release (DataPlatform + WebApp):
#   dataplatform.enabled: true
#   aiml.enabled:         false
#   webapp.enabled:       true
#   Result: Stage 1 runs first. Stage 2 is skipped. Stage 3 runs after Stage 1 succeeds.
#
# Future release (all three components):
#   dataplatform.enabled: true
#   aiml.enabled:         true
#   webapp.enabled:       true
#   Result: Stages run in sequence: 1 then 2 then 3. If Stage 1 fails, Stages 2 and 3 are blocked.
#
# AIML configuration-only change (no DB dependency):
#   dataplatform.enabled: false
#   aiml.enabled:         true
#   webapp.enabled:       false
#   Result: Stage 1 is skipped. Stage 2 runs. Stage 3 is skipped.
#
# ─────────────────────────────────────────────────────────────────────────────
# NOTES FOR THE DEVOPS ENGINEER IMPLEMENTING THIS
# ─────────────────────────────────────────────────────────────────────────────
#
# 1. Each component CI pipeline (WebApp-CI, DataPlatform-CI, AIML-CI) must publish
#    its artifact using the 'publish' keyword or PublishPipelineArtifact@1 task.
#    The artifact name must match the artifactName in release-config.yml.
#
# 2. The Azure service connection name ("Azure-ServiceConnection") needs to be
#    replaced with the actual connection name configured in ADO Project Settings.
#
# 3. The 'environment' resources (staging, uat, production) must be created in
#    ADO Environments before the pipeline runs. Approval gates can be added there.
#
# 4. The powershell-yaml module is used to parse the config file. An alternative
#    is to use a Python script with PyYAML if the agent already has Python available.
#
# 5. For the dryRun parameter, all AzureCLI tasks are conditioned to skip when
#    dryRun is true. This lets the release manager validate the pipeline plan
#    before committing to an actual deployment.
