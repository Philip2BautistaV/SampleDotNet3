# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - develop
      - release/*
      - main

pr:
  branches:
    include:
      - develop
      - release/*

pool:
  vmImage: windows-latest

steps:

# Install .NET 9 SDK
- task: UseDotNet@2
  displayName: 'Install .NET 9 SDK'
  inputs:
    packageType: 'sdk'
    version: '9.0.x'

# Verify installation
- script: |
    dotnet --info
  displayName: 'Display .NET Info'

# Restore packages
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: 'LGWebApp.csproj'

# Build
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: 'LGWebApp.csproj'
    arguments: '--configuration $(buildConfiguration) --no-restore'

